services:
  ra-indexer:
    build:
      context: .
      dockerfile: Dockerfile
    image: danielrajmon/ra-indexer:latest
    container_name: ra-indexer
    environment:
      POSTGRES_HOST: "${POSTGRES_HOST:?POSTGRES_HOST is required}"
      POSTGRES_PORT: "${POSTGRES_PORT:?POSTGRES_PORT is required}"
      POSTGRES_DB: "${POSTGRES_DB:?POSTGRES_DB is required}"
      POSTGRES_USER: "${POSTGRES_USER:?POSTGRES_USER is required}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      RA_USERNAME: "${RA_USERNAME:?RA_USERNAME is required}"
      RA_API_KEY: "${RA_API_KEY:?RA_API_KEY is required}"
    restart: no
